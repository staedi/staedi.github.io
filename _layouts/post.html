---
layout: default
---

<div>
    <h1>{{ page.title }}</h1>
    <p>
        <h5 style='display:inline'>Published: </h5><h4 style='display:inline'><time datetime="{{ page.date | date_to_xmlschema }}" class="post-date">{{ page.date | date_to_string }}</time></h4>
        <br />
        <h5 style='display:inline'>Tags: [{% for tag in page.tags %} <h4 style='display:inline'>{{ tag }} {% endfor %}]</h4>
    </p>
</div>

<div>{{ content }}</div>
